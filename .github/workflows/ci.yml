name: ML CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Install Dependencies
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt

    - name: Check App Import (Basic Test)
      run: |
        python -c "import inference.app"

    - name: Build Docker Image
      run: |
        docker build -t transaction-risk-ml .

    - name: Run Container Test
      run: |
        docker run -d -p 8000:8000 transaction-risk-ml
        sleep 10